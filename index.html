<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>WiFi Billing - T-plink</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/93/93158.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #ef4444;
            --bg: #69cef9;
            --text: #1e293b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            padding: 15px;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 900px; margin: auto; }

        .app-header { text-align: center; margin-bottom: 20px; padding-top: 10px; }
        .app-header .logo-icon { font-size: 50px; color: white; }
        .app-header h1 { color: white; margin: 5px 0; font-size: 22px; }

        .form-card {
            background: white; 
            padding: 20px; 
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            margin-bottom: 25px;
        }

        .grid-inputs { 
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }

        /* Desktop View Grid */
        @media (min-width: 768px) {
            .grid-inputs { 
                display: grid; 
                grid-template-columns: 2fr 1fr 1fr 1fr; 
            }
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .material-symbols-rounded {
            position: absolute;
            left: 12px;
            color: #94a3b8;
            pointer-events: none; /* PENTING: Agar ikon tidak menghalangi klik/sentuhan */
            z-index: 5;
        }

        input, select {
            width: 100%;
            padding: 14px 12px 14px 45px;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px; /* PENTING: Minimal 16px agar HP tidak auto-zoom/macet */
            outline: none;
            background-color: #fff;
            appearance: none; /* Hilangkan style bawaan HP */
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button.btn-simpan {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        /* Tabel & Laporan */
        .month-section { margin-top: 25px; }
        .month-header { 
            background: white; padding: 15px; 
            border-radius: 12px; font-weight: bold; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 6px solid var(--primary);
        }

        .table-container { 
            background: white; border-radius: 12px; 
            overflow-x: auto; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 11px; color: #64748b; }
        td { padding: 12px; border-top: 1px solid #f1f5f9; font-size: 14px; }

        .btn-hapus { 
            background: #fee2e2; color: var(--danger); border: none; padding: 8px; 
            border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <span class="material-symbols-rounded logo-icon">wifi_tethering</span>
        <h1>T-plink Dashboard</h1>
    </div>

    <div class="form-card">
        <div class="grid-inputs">
            <div class="input-wrapper">
                <span class="material-symbols-rounded">person</span>
                <input type="text" id="nama" placeholder="Nama Pelanggan" autocomplete="off">
            </div>
            <div class="input-wrapper">
                <span class="material-symbols-rounded">payments</span>
                <input type="number" id="nominal" placeholder="Nominal (Rp)" inputmode="numeric">
            </div>
            <div class="input-wrapper">
                <span class="material-symbols-rounded">calendar_month</span>
                <select id="bulan">
                    <option value="Januari">Januari</option>
                    <option value="Februari">Februari</option>
                    <option value="Maret">Maret</option>
                    <option value="April">April</option>
                    <option value="Mei">Mei</option>
                    <option value="Juni">Juni</option>
                    <option value="Juli">Juli</option>
                    <option value="Agustus">Agustus</option>
                    <option value="September">September</option>
                    <option value="Oktober">Oktober</option>
                    <option value="November">November</option>
                    <option value="Desember">Desember</option>
                </select>
            </div>
            <div class="input-wrapper">
                <span class="material-symbols-rounded">event</span>
                <input type="number" id="tahun" placeholder="Tahun">
            </div>
            <button class="btn-simpan" onclick="tambahData()">
                <span class="material-symbols-rounded">add_circle</span> Simpan Data
            </button>
        </div>
    </div>

    <div id="daftar-laporan"></div>
</div>

<script>
    document.getElementById('tahun').value = new Date().getFullYear();
    let dbKeuangan = JSON.parse(localStorage.getItem('dataWiFiModern')) || [];

    function updateTampilan() {
        const container = document.getElementById('daftar-laporan');
        container.innerHTML = "";
        const periodeUnik = [...new Set(dbKeuangan.map(item => `${item.bulan} ${item.tahun}`))].reverse();

        periodeUnik.forEach(periode => {
            const [namaBulan, namaTahun] = periode.split(" ");
            const dataPeriode = dbKeuangan.filter(item => item.bulan === namaBulan && item.tahun === namaTahun);
            const totalPerBulan = dataPeriode.reduce((sum, item) => sum + item.jumlah, 0);

            const section = document.createElement('div');
            section.className = 'month-section';
            section.innerHTML = `
                <div class="month-header">
                    <span>📅 ${periode.toUpperCase()}</span>
                    <span style="color:var(--primary)">Rp ${totalPerBulan.toLocaleString('id-ID')}</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nama</th>
                                <th>Nominal</th>
                                <th style="text-align:center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${dataPeriode.map((item) => `
                                <tr>
                                    <td><strong>${item.nama}</strong></td>
                                    <td>Rp ${item.jumlah.toLocaleString('id-ID')}</td>
                                    <td style="text-align:center">
                                        <button class="btn-hapus" onclick="hapusData('${item.id}')">
                                            <span class="material-symbols-rounded">delete</span>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            container.appendChild(section);
        });
    }

    function tambahData() {
        const nama = document.getElementById('nama').value;
        const jumlahInput = document.getElementById('nominal').value;
        const jumlah = parseInt(jumlahInput);
        const bulan = document.getElementById('bulan').value;
        const tahun = document.getElementById('tahun').value;

        if(!nama || !jumlahInput || !tahun) {
            alert("Harap lengkapi semua data!");
            return;
        }

        dbKeuangan.push({ id: Date.now().toString(), nama, jumlah, bulan, tahun });
        localStorage.setItem('dataWiFiModern', JSON.stringify(dbKeuangan));
        updateTampilan();
        
        document.getElementById('nama').value = "";
        document.getElementById('nominal').value = "";
    }

    function hapusData(id) {
        if(confirm("Hapus data ini?")) {
            dbKeuangan = dbKeuangan.filter(item => item.id !== id);
            localStorage.setItem('dataWiFiModern', JSON.stringify(dbKeuangan));
            updateTampilan();
        }
    }

    updateTampilan();
</script>
</body>
</html>
