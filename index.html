<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>T-PLINK BILLING</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/93/93158.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --bg: #69cef9; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .app-header { text-align: center; margin: 20px 0; color: white; }
        
        .form-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .input-wrapper { position: relative; margin-bottom: 15px; }
        .input-wrapper span { position: absolute; left: 12px; top: 14px; color: #94a3b8; pointer-events: none; }
        
        input, select { width: 100%; padding: 14px 12px 14px 45px; border: 1.5px solid #cbd5e1; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .btn-group { display: grid; gap: 10px; margin-top: 10px; }
        button { width: 100%; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; padding: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        
        .btn-simpan { background: var(--primary); color: white; }
        .btn-download { background: var(--success); color: white; }
        button:active { transform: scale(0.95); }

        .month-section { margin-top: 25px; }
        .month-header { background: white; padding: 15px; border-radius: 12px 12px 0 0; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 2px solid #f1f5f9; }
        .table-container { background: white; border-radius: 0 0 12px 12px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-top: 1px solid #f1f5f9; font-size: 14px; }
        .btn-hapus { background: #fee2e2; color: #ef4444; padding: 6px 10px; border-radius: 8px; font-size: 12px; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <span class="material-symbols-rounded" style="font-size: 50px;">wifi</span>
        <h1 style="margin:0">T-PLINK BILLING</h1>
    </div>

    <div class="form-card">
        <div class="input-wrapper">
            <span class="material-symbols-rounded">person</span>
            <input type="text" id="nama" placeholder="Nama Pelanggan">
        </div>
        <div class="input-wrapper">
            <span class="material-symbols-rounded">payments</span>
            <input type="number" id="nominal" placeholder="Nominal" inputmode="numeric">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <select id="bulan">
                <option value="Januari">Januari</option><option value="Februari">Februari</option>
                <option value="Maret">Maret</option><option value="April">April</option>
                <option value="Mei">Mei</option><option value="Juni">Juni</option>
                <option value="Juli">Juli</option><option value="Agustus">Agustus</option>
                <option value="September">September</option><option value="Oktober">Oktober</option>
                <option value="November">November</option><option value="Desember">Desember</option>
            </select>
            <input type="number" id="tahun" value="2025">
        </div>
        
        <div class="btn-group">
            <button class="btn-simpan" onclick="tambahData()">
                <span class="material-symbols-rounded">add_circle</span> SIMPAN DATA
            </button>
            <button class="btn-download" onclick="downloadLaporan()">
                <span class="material-symbols-rounded">download</span> DOWNLOAD EXCEL (CSV)
            </button>
        </div>
    </div>

    <div id="daftar-laporan"></div>
</div>

<script>
    function loadData() {
        const saved = localStorage.getItem('TPLINK_DATA_PERMANEN');
        return saved ? JSON.parse(saved) : [];
    }

    let db = loadData();

    function render() {
        const container = document.getElementById('daftar-laporan');
        container.innerHTML = "";
        const bulanUnik = [...new Set(db.map(i => `${i.bulan} ${i.tahun}`))].reverse();

        bulanUnik.forEach(p => {
            const itemBulan = db.filter(i => `${i.bulan} ${i.tahun}` === p);
            const total = itemBulan.reduce((s, i) => s + i.jumlah, 0);

            let html = `
                <div class="month-section">
                    <div class="month-header">
                        <span>${p.toUpperCase()}</span>
                        <span style="color:var(--primary)">Rp ${total.toLocaleString('id-ID')}</span>
                    </div>
                    <div class="table-container">
                        <table>
            `;
            itemBulan.forEach(i => {
                html += `
                    <tr>
                        <td><strong>${i.nama}</strong></td>
                        <td>Rp ${i.jumlah.toLocaleString('id-ID')}</td>
                        <td style="text-align:right">
                            <button class="btn-hapus" onclick="hapus('${i.id}')">Hapus</button>
                        </td>
                    </tr>
                `;
            });
            html += `</table></div></div>`;
            container.innerHTML += html;
        });
    }

    function tambahData() {
        const nama = document.getElementById('nama').value;
        const jumlah = parseInt(document.getElementById('nominal').value);
        const bulan = document.getElementById('bulan').value;
        const tahun = document.getElementById('tahun').value;

        if(!nama || !jumlah) return alert("Isi nama dan nominal!");

        db.push({ id: Date.now().toString(), nama, jumlah, bulan, tahun });
        localStorage.setItem('TPLINK_DATA_PERMANEN', JSON.stringify(db));
        
        document.getElementById('nama').value = "";
        document.getElementById('nominal').value = "";
        render();
    }

    function hapus(id) {
        if(confirm("Hapus data?")) {
            db = db.filter(i => i.id !== id);
            localStorage.setItem('TPLINK_DATA_PERMANEN', JSON.stringify(db));
            render();
        }
    }

    // FUNGSI DOWNLOAD FILE CSV
    function downloadLaporan() {
        if (db.length === 0) return alert("Belum ada data untuk diunduh!");

        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Nama Pelanggan,Bulan,Tahun,Nominal\n"; // Judul Kolom

        db.forEach(item => {
            csvContent += `${item.nama},${item.bulan},${item.tahun},${item.jumlah}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Laporan_WiFi_TPLink.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    render();
</script>
</body>
</html>
